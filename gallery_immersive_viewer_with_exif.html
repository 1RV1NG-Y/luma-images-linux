<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Immersive Photo Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      padding: clamp(12px, 4vw, 48px);
      background: #ececea;
      color: #202020;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { width: min(1100px, 100%); margin: 0 auto; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
<main>
<h2 class="sr-only">Immersive photo viewer mockup: full-bleed image with a metadata and EXIF side panel, a thumbnail filmstrip, and keyboard navigation hints</h2>
<div style="border-radius:12px; overflow:hidden; background:#141414; min-height:440px; display:flex; flex-direction:column;">

  <div style="display:flex; align-items:center; gap:12px; padding:12px 16px; color:#cfcfcf; font-size:13px;">
    <i class="ti ti-arrow-left" aria-hidden="true"></i>
    <span style="flex:1;">iceland_0442.raf</span>
    <i class="ti ti-star" aria-hidden="true"></i>
    <i class="ti ti-share" aria-hidden="true"></i>
    <i class="ti ti-info-circle" style="color:#fff;" aria-hidden="true"></i>
  </div>

  <div style="flex:1; display:flex; min-height:300px;">
    <div style="flex:1; display:flex; align-items:center; justify-content:center; position:relative; padding:0 8px;">
      <i class="ti ti-chevron-left" style="color:#888; font-size:24px;" aria-hidden="true"></i>
      <div style="flex:1; align-self:stretch; margin:8px 12px; background:#2b2b2b; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#4a4a4a;"><i class="ti ti-mountain" style="font-size:40px;" aria-hidden="true"></i></div>
      <i class="ti ti-chevron-right" style="color:#888; font-size:24px;" aria-hidden="true"></i>
    </div>

    <div style="width:190px; flex-shrink:0; background:#1c1c1c; border-left:0.5px solid #333; padding:16px; color:#cfcfcf; font-size:12px;">
      <div style="color:#888; margin-bottom:10px;">Details</div>
      <div style="display:flex; justify-content:space-between; padding:5px 0;"><span style="color:#888;">Camera</span><span>X-T5</span></div>
      <div style="display:flex; justify-content:space-between; padding:5px 0;"><span style="color:#888;">Lens</span><span>23mm f/2</span></div>
      <div style="display:flex; justify-content:space-between; padding:5px 0;"><span style="color:#888;">ISO</span><span>160</span></div>
      <div style="display:flex; justify-content:space-between; padding:5px 0;"><span style="color:#888;">Shutter</span><span>1/500</span></div>
      <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:0.5px solid #333; padding-bottom:12px;"><span style="color:#888;">Date</span><span>12 Jul 2025</span></div>
      <div style="display:flex; align-items:center; gap:6px; padding:12px 0 6px; color:#888;"><i class="ti ti-map-pin" aria-hidden="true"></i>Vík, Iceland</div>
      <div style="height:56px; background:#2b2b2b; border-radius:6px;"></div>
    </div>
  </div>

  <div style="display:flex; align-items:center; gap:6px; padding:10px 16px; background:#181818; border-top:0.5px solid #2a2a2a;">
    <div style="width:44px; height:34px; background:#333; border-radius:4px;"></div>
    <div style="width:44px; height:34px; background:#3d3d3d; border-radius:4px; outline:2px solid #fff;"></div>
    <div style="width:44px; height:34px; background:#333; border-radius:4px;"></div>
    <div style="width:44px; height:34px; background:#2e2e2e; border-radius:4px;"></div>
    <div style="width:44px; height:34px; background:#363636; border-radius:4px;"></div>
    <div style="flex:1;"></div>
    <span style="color:#666; font-size:11px;">← → to move · I for info · Esc to close</span>
  </div>
</div>
</main>
</body>
</html>

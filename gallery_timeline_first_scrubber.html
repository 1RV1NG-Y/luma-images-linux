<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timeline-first Gallery</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    :root {
      color-scheme: light;
      --border: #d9d9d4;
      --surface-1: #f4f4f1;
      --surface-2: #ffffff;
      --radius: 7px;
      --bg-accent: #e6f0ff;
      --text-primary: #202124;
      --text-secondary: #555b65;
      --text-muted: #7b8088;
      --text-accent: #1769d2;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      padding: clamp(12px, 4vw, 48px);
      background: #ececea;
      color: var(--text-primary);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { width: min(1100px, 100%); margin: 0 auto; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
<main>
<h2 class="sr-only">Gallery mockup organized by time: date-grouped photo grid with a year and month scrubber on the right and a zoom control</h2>
<div style="display:flex; border:0.5px solid var(--border); border-radius:12px; overflow:hidden; background:var(--surface-2); min-height:440px;">

  <div style="flex:1; padding:16px 18px; min-width:0;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:16px;">
      <div style="display:inline-flex; border:0.5px solid var(--border); border-radius:var(--radius); overflow:hidden; font-size:13px;">
        <span style="padding:6px 12px; color:var(--text-muted);">Years</span>
        <span style="padding:6px 12px; color:var(--text-muted); border-left:0.5px solid var(--border);">Months</span>
        <span style="padding:6px 12px; background:var(--bg-accent); color:var(--text-accent); border-left:0.5px solid var(--border);">Days</span>
      </div>
      <div style="flex:1;"></div>
      <i class="ti ti-zoom-in" style="color:var(--text-secondary);" aria-hidden="true"></i>
    </div>

    <div style="font-size:15px; font-weight:500; color:var(--text-primary); margin-bottom:8px;">Saturday, 12 July</div>
    <div style="display:grid; grid-template-columns:repeat(6,1fr); gap:5px; margin-bottom:20px;">
      <div style="aspect-ratio:1; background:var(--c-teal-100,#9FE1CB); border-radius:4px;"></div>
      <div style="aspect-ratio:1; background:var(--c-blue-100,#B5D4F4); border-radius:4px;"></div>
      <div style="aspect-ratio:1; background:var(--c-amber-100,#FAC775); border-radius:4px;"></div>
      <div style="aspect-ratio:1; background:var(--c-coral-100,#F5C4B3); border-radius:4px;"></div>
      <div style="aspect-ratio:1; background:var(--c-purple-100,#CECBF6); border-radius:4px;"></div>
      <div style="aspect-ratio:1; background:var(--c-gray-100,#D3D1C7); border-radius:4px;"></div>
    </div>

    <div style="font-size:15px; font-weight:500; color:var(--text-primary); margin-bottom:8px;">Thursday, 3 July</div>
    <div style="display:grid; grid-template-columns:repeat(6,1fr); gap:5px;">
      <div style="aspect-ratio:1; background:var(--c-pink-100,#F4C0D1); border-radius:4px;"></div>
      <div style="aspect-ratio:1; background:var(--c-green-100,#C0DD97); border-radius:4px;"></div>
      <div style="aspect-ratio:1; background:var(--c-blue-100,#B5D4F4); border-radius:4px;"></div>
      <div style="aspect-ratio:1; background:var(--c-teal-100,#9FE1CB); border-radius:4px;"></div>
      <div style="aspect-ratio:1; background:var(--c-amber-100,#FAC775); border-radius:4px;"></div>
      <div style="aspect-ratio:1; background:var(--c-coral-100,#F5C4B3); border-radius:4px;"></div>
    </div>
  </div>

  <div style="width:64px; flex-shrink:0; border-left:0.5px solid var(--border); background:var(--surface-1); padding:16px 0; display:flex; flex-direction:column; align-items:center; gap:2px; font-size:12px; color:var(--text-muted);">
    <span style="color:var(--text-primary); font-weight:500;">2026</span>
    <div style="width:3px; height:26px; background:var(--border); border-radius:2px; margin:2px 0;"></div>
    <span>2025</span>
    <div style="width:3px; height:26px; background:var(--border); border-radius:2px; margin:2px 0;"></div>
    <span>2024</span>
    <div style="width:3px; height:44px; background:var(--text-accent); border-radius:2px; margin:2px 0;"></div>
    <span>2023</span>
    <div style="width:3px; height:26px; background:var(--border); border-radius:2px; margin:2px 0;"></div>
    <span>2022</span>
  </div>
</div>
</main>
</body>
</html>

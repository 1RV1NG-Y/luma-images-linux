<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Classic Justified Gallery</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    :root {
      color-scheme: light;
      --border: #d9d9d4;
      --surface-1: #f4f4f1;
      --surface-2: #ffffff;
      --radius: 7px;
      --bg-accent: #e6f0ff;
      --text-primary: #202124;
      --text-secondary: #555b65;
      --text-muted: #7b8088;
      --text-accent: #1769d2;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      padding: clamp(12px, 4vw, 48px);
      background: #ececea;
      color: var(--text-primary);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { width: min(1100px, 100%); margin: 0 auto; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
<main>
<h2 class="sr-only">Gallery app mockup: left sidebar with albums and a justified masonry photo grid preserving aspect ratios</h2>
<div style="display:flex; border:0.5px solid var(--border); border-radius:12px; overflow:hidden; background:var(--surface-2); min-height:420px;">

  <div style="width:180px; flex-shrink:0; border-right:0.5px solid var(--border); background:var(--surface-1); padding:16px 10px;">
    <div style="font-size:13px; color:var(--text-muted); padding:4px 8px; margin-bottom:4px;">Library</div>
    <div style="display:flex; align-items:center; gap:8px; padding:7px 8px; border-radius:var(--radius); font-size:14px; background:var(--bg-accent); color:var(--text-accent);"><i class="ti ti-photo" aria-hidden="true"></i>All photos</div>
    <div style="display:flex; align-items:center; gap:8px; padding:7px 8px; font-size:14px; color:var(--text-secondary);"><i class="ti ti-star" aria-hidden="true"></i>Favorites</div>
    <div style="display:flex; align-items:center; gap:8px; padding:7px 8px; font-size:14px; color:var(--text-secondary);"><i class="ti ti-clock" aria-hidden="true"></i>Recent</div>
    <div style="font-size:13px; color:var(--text-muted); padding:4px 8px; margin:12px 0 4px;">Albums</div>
    <div style="display:flex; align-items:center; gap:8px; padding:7px 8px; font-size:14px; color:var(--text-secondary);"><i class="ti ti-folder" aria-hidden="true"></i>Iceland 2025</div>
    <div style="display:flex; align-items:center; gap:8px; padding:7px 8px; font-size:14px; color:var(--text-secondary);"><i class="ti ti-folder" aria-hidden="true"></i>Film scans</div>
    <div style="display:flex; align-items:center; gap:8px; padding:7px 8px; font-size:14px; color:var(--text-secondary);"><i class="ti ti-folder" aria-hidden="true"></i>Studio</div>
  </div>

  <div style="flex:1; padding:16px 18px; min-width:0;">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
      <div style="flex:1; display:flex; align-items:center; gap:8px; height:34px; border:0.5px solid var(--border); border-radius:var(--radius); padding:0 10px; color:var(--text-muted); font-size:13px;"><i class="ti ti-search" aria-hidden="true"></i>Search photos</div>
      <div style="width:34px; height:34px; border:0.5px solid var(--border); border-radius:var(--radius); display:flex; align-items:center; justify-content:center; color:var(--text-secondary);"><i class="ti ti-layout-grid" aria-hidden="true"></i></div>
    </div>
    <div style="display:flex; gap:6px; margin-bottom:6px;">
      <div style="flex:2.2; height:96px; background:var(--c-teal-100,#9FE1CB); border-radius:6px;"></div>
      <div style="flex:1; height:96px; background:var(--c-amber-100,#FAC775); border-radius:6px;"></div>
      <div style="flex:1.4; height:96px; background:var(--c-blue-100,#B5D4F4); border-radius:6px;"></div>
    </div>
    <div style="display:flex; gap:6px; margin-bottom:6px;">
      <div style="flex:1; height:110px; background:var(--c-coral-100,#F5C4B3); border-radius:6px;"></div>
      <div style="flex:1.6; height:110px; background:var(--c-purple-100,#CECBF6); border-radius:6px;"></div>
      <div style="flex:1; height:110px; background:var(--c-pink-100,#F4C0D1); border-radius:6px;"></div>
      <div style="flex:0.7; height:110px; background:var(--c-green-100,#C0DD97); border-radius:6px;"></div>
    </div>
    <div style="display:flex; gap:6px;">
      <div style="flex:1; height:88px; background:var(--c-gray-100,#D3D1C7); border-radius:6px;"></div>
      <div style="flex:1.3; height:88px; background:var(--c-blue-100,#B5D4F4); border-radius:6px;"></div>
      <div style="flex:2; height:88px; background:var(--c-teal-100,#9FE1CB); border-radius:6px;"></div>
    </div>
  </div>
</div>
</main>
</body>
</html>
